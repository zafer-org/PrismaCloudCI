name: PrismaCloud Action

on:
  pull_request:

jobs:
  build-and-scan:
    name: Build and scan Image
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set Image Name and Labels
        run: |
          # 1. Automatic Filename Detection
          if [ -f "Dockerfile" ]; then
            FILE="Dockerfile"
          elif [ -f "DockerFile" ]; then
            FILE="DockerFile"
          else
            echo "Error: Neither Dockerfile nor DockerFile found!"
            ls -R
            exit 1
          fi
          echo "DOCKERFILE=$FILE" >> $GITHUB_ENV

          # 2. Image Name Logic
          IMAGE_NAME=${{ vars.IMAGE_NAME || 'none' }}
          if [[ $IMAGE_NAME == "none" ]]; then
            IMAGE_NAME=$(echo "${{ github.repository }}:${{ github.head_ref }}" | tr '[:upper:]' '[:lower:]')
          fi
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          
          # 3. Inject labels using the detected filename
          sed -i "2 i LABEL REPOSITORY=\"${{ github.repository }}\"" $FILE
          sed -i "2 i LABEL ACTOR=\"${{ github.actor }}\"" $FILE
          sed -i "2 i LABEL RUN_ID=\"${{ github.run_id }}\"" $FILE

      - name: Build the image
        run: docker build -t ${{ env.IMAGE_NAME }} -f ${{ env.DOCKERFILE }} .

      - name: Prisma Cloud image scan
        id: scan
        uses: PaloAltoNetworks/prisma-cloud-scan@v1.6.7
        with:
          pcc_console_url: ${{ secrets.PCC_URL }}
          pcc_user: ${{ secrets.PCC_USER }}
          pcc_pass: ${{ secrets.PCC_PASS }}
          image_name: ${{ env.IMAGE_NAME }}